<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数独游戏 - 得分挑战版</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #2c3e50 0%, #1a2a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            padding: 24px 20px 28px 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .sudoku-card {
            background: #fef9e8;
            border-radius: 48px;
            padding: 20px 16px 24px 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
            padding: 0 12px;
        }
        h1 {
            text-align: left;
            margin: 0;
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #3b5e3b, #2c4c2c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.05);
            display: inline-block;
        }
        .score-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #e8e0d0;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05), 0 2px 5px rgba(0,0,0,0.1);
        }
        .score-label {
            font-size: 1rem;
            font-weight: 600;
            color: #5a4a32;
        }
        .score-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #2c6e2c;
            line-height: 1;
            min-width: 50px;
            text-align: center;
            font-family: monospace;
        }
        .reset-score {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 6px;
            border-radius: 30px;
            transition: 0.1s;
            color: #c44536;
        }
        .reset-score:active {
            transform: scale(0.9);
        }

        .sub {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-bottom: 1px dashed #ddd;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 5px;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: #2c3e2c;
            border: 3px solid #2c3e2c;
            border-radius: 16px;
            overflow: hidden;
            width: min(68vw, 68vh, 520px);
            height: min(68vw, 68vh, 520px);
            margin: 0 auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .cell {
            background-color: #fffaf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 500;
            font-family: 'Courier New', 'Fira Mono', monospace;
            color: #2c3e2c;
            cursor: pointer;
            border: 1px solid #ddceb2;
            position: relative;
            transition: all 0.08s linear;
        }

        .cell[data-col="2"]:not([data-col="8"]),
        .cell[data-col="5"]:not([data-col="8"]) {
            border-right: 3px solid #2c3e2c;
        }

        .cell[data-row="2"]:not([data-row="8"]),
        .cell[data-row="5"]:not([data-row="8"]) {
            border-bottom: 3px solid #2c3e2c;
        }

        .cell.selected {
            background-color: #e0f0e8;
            box-shadow: inset 0 0 0 2px #3b8c3b;
            color: #1f4f1f;
            transform: scale(0.98);
        }

        .cell.highlight-row-col {
            background-color: #f9efcf;
        }

        .cell.conflict {
            background-color: #ffe0e0;
            color: #c0392b;
            text-shadow: 0 0 2px rgba(192,57,43,0.3);
        }

        .cell.given {
            color: #2c6e2c;
            font-weight: 800;
        }

        .cell.user-number {
            color: #1e466e;
            font-weight: 600;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
            margin-bottom: 16px;
        }

        button {
            background: #ece5d8;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            font-family: inherit;
            color: #2c3e2c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3b5e3b;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .num-pad {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .num-btn {
            background: #f0e3d0;
            width: 52px;
            height: 52px;
            border-radius: 32px;
            font-size: 1.9rem;
            font-weight: 700;
            font-family: monospace;
            justify-content: center;
            align-items: center;
            display: flex;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.05s linear;
        }
        .num-btn:active {
            transform: scale(0.94);
            background: #e2d4be;
        }

        .num-btn.clear {
            background: #cfc5b0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .status {
            text-align: center;
            background: #e8e0d0;
            margin-top: 20px;
            padding: 10px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c3e2c;
        }

        .victory {
            background: #78b83e;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .difficulty-btn {
            background: #d9cdb0;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 60px;
            transition: 0.1s;
        }
        .difficulty-btn.active {
            background: #2c6e2c;
            color: white;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        .difficulty-btn:active {
            transform: scale(0.96);
        }

        @media (max-width: 550px) {
            .sudoku-grid {
                width: min(88vw, 88vh, 460px);
                height: min(88vw, 88vh, 460px);
            }
            .cell {
                font-size: 1.2rem;
            }
            .num-btn {
                width: 45px;
                height: 45px;
                font-size: 1.6rem;
            }
            button {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .score-value {
                font-size: 1.3rem;
                min-width: 40px;
            }
            .score-label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

    // 辅助函数
    function copyBoard(board) {
        return board.map(row => [...row]);
    }

    function solveSudoku(board) {
        const n = 9;
        function isValid(r, c, val) {
            for (let i = 0; i < 9; i++) {
                if (board[r][i] === val && i !== c) return false;
                if (board[i][c] === val && i !== r) return false;
                const boxRow = 3 * Math.floor(r / 3) + Math.floor(i / 3);
                const boxCol = 3 * Math.floor(c / 3) + (i % 3);
                if (board[boxRow][boxCol] === val && (boxRow !== r || boxCol !== c)) return false;
            }
            return true;
        }
        function backtrack() {
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (board[i][j] === 0) {
                        for (let num = 1; num <= 9; num++) {
                            if (isValid(i, j, num)) {
                                board[i][j] = num;
                                if (backtrack()) return true;
                                board[i][j] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }
        const boardCopy = copyBoard(board);
        if (backtrack()) {
            for (let i = 0; i < n; i++)
                for (let j = 0; j < n; j++)
                    board[i][j] = boardCopy[i][j];
            return true;
        }
        return false;
    }

    function computeSolution(puzzle) {
        let copy = copyBoard(puzzle);
        solveSudoku(copy);
        return copy;
    }

    // ---------- 得分机制 ----------
    let totalScore = 0;
    let currentGameWon = false;      // 防止重复加分
    const scoreElement = document.getElementById('totalScore');

    function updateScoreUI() {
        scoreElement.innerText = totalScore;
        // 可选：保存到localStorage
        localStorage.setItem('sudoku_total_score', totalScore);
    }

    function addScoreForDifficulty(diff) {
        let points = 0;
        if (diff === 'easy') points = 1;
        else if (diff === 'medium') points = 3;
        else if (diff === 'hard') points = 5;
        if (points > 0 && !currentGameWon) {
            totalScore += points;
            updateScoreUI();
            updateStatus(`🎉 +${points}分！ 总分: ${totalScore}`, true);
            currentGameWon = true;
            return true;
        }
        return false;
    }

    function resetTotalScore() {
        if (confirm('确定要重置总分吗？')) {
            totalScore = 0;
            updateScoreUI();
            updateStatus('总分已重置为0', false);
        }
    }

    // 检查胜利并自动加分
    function checkAndAwardWin() {
        if (isBoardFullAndValid() && !currentGameWon) {
            addScoreForDifficulty(activeDifficulty);
            // 状态消息已经在addScoreForDifficulty中设置胜利+得分
            // 同时让状态栏显示胜利样式
            updateStatus(`🎉 恭喜完成本关！ +${getPointsForDifficulty(activeDifficulty)}分 总分:${totalScore} 🎉`, true);
            return true;
        }
        return false;
    }
    function getPointsForDifficulty(diff) {
        if (diff === 'easy') return 1;
        if (diff === 'medium') return 3;
        return 5;
    }

    // 重置当前关卡的胜利标志（新游戏、换题、重置时调用）
    function resetWinFlag() {
        currentGameWon = false;
    }

    // 全局变量
    let currentPuzzle = [];
    let currentSolution = [];
    let userBoard = [];
    let fixedMask = [];
    let selectedRow = -1, selectedCol = -1;
    let conflictCells = new Set();
    let activeDifficulty = 'medium';
    let currentPuzzleIndex = 0;

    const gridContainer = document.getElementById('sudoku-grid');
    const statusDiv = document.getElementById('statusMsg');

    function selectRandomPuzzle(difficulty, keepIndex = false) {
        const arr = PUZZLE_SET[difficulty];
        if (!arr || arr.length === 0) return;
        let idx;
        if (keepIndex && currentPuzzleIndex >= 0 && currentPuzzleIndex < arr.length) {
            idx = currentPuzzleIndex;
        } else {
            idx = Math.floor(Math.random() * arr.length);
        }
        currentPuzzleIndex = idx;
        const selected = copyBoard(arr[idx]);
        currentPuzzle = selected;
        currentSolution = computeSolution(selected);
        userBoard = copyBoard(currentPuzzle);
        fixedMask = Array(9).fill().map(() => Array(9).fill(false));
        for (let i = 0; i < 9; i++)
            for (let j = 0; j < 9; j++)
                fixedMask[i][j] = (currentPuzzle[i][j] !== 0);
        selectedRow = -1;
        selectedCol = -1;
        conflictCells.clear();
        resetWinFlag();           // 新题目重置胜利标志
        renderGrid();
        const diffName = difficulty === 'easy' ? '简单' : difficulty === 'medium' ? '中等' : '困难';
        updateStatus(`✨ ${diffName} · 第 ${idx+1}/${arr.length} 关 ✨`, false);
    }

    function nextPuzzle() {
        const arr = PUZZLE_SET[activeDifficulty];
        if (!arr || arr.length <= 1) {
            updateStatus("当前难度只有一题，无法换题", false);
            return;
        }
        let newIdx = currentPuzzleIndex;
        while (newIdx === currentPuzzleIndex && arr.length > 1) {
            newIdx = Math.floor(Math.random() * arr.length);
        }
        currentPuzzleIndex = newIdx;
        const newPuzzle = copyBoard(arr[newIdx]);
        currentPuzzle = newPuzzle;
        currentSolution = computeSolution(currentPuzzle);
        userBoard = copyBoard(currentPuzzle);
        fixedMask = Array(9).fill().map(() => Array(9).fill(false));
        for (let i = 0; i < 9; i++)
            for (let j = 0; j < 9; j++)
                fixedMask[i][j] = (currentPuzzle[i][j] !== 0);
        selectedRow = -1;
        selectedCol = -1;
        conflictCells.clear();
        resetWinFlag();
        renderGrid();
        const diffName = activeDifficulty === 'easy' ? '简单' : activeDifficulty === 'medium' ? '中等' : '困难';
        updateStatus(`🎲 换题成功 · ${diffName} 第 ${currentPuzzleIndex+1}/${arr.length} 关`, false);
    }

    function resetGame() {
        userBoard = copyBoard(currentPuzzle);
        conflictCells.clear();
        selectedRow = -1;
        selectedCol = -1;
        resetWinFlag();     // 重置后本关未胜利，可以再次挑战得分
        renderGrid();
        updateStatus("已重置到本关初始状态", false);
    }

    function isValidPlacement(row, col, val, board) {
        if (val === 0) return true;
        for (let i = 0; i < 9; i++) {
            if (i !== col && board[row][i] === val) return false;
            if (i !== row && board[i][col] === val) return false;
            const boxRow = 3 * Math.floor(row / 3) + Math.floor(i / 3);
            const boxCol = 3 * Math.floor(col / 3) + (i % 3);
            if ((boxRow !== row || boxCol !== col) && board[boxRow][boxCol] === val) return false;
        }
        return true;
    }

    function updateConflictsAfterChange(row, col) {
        const related = new Set();
        for (let i = 0; i < 9; i++) {
            related.add(`${row},${i}`);
            related.add(`${i},${col}`);
            const boxRow = 3 * Math.floor(row / 3) + Math.floor(i / 3);
            const boxCol = 3 * Math.floor(col / 3) + (i % 3);
            related.add(`${boxRow},${boxCol}`);
        }
        for (const coord of related) {
            const [r, c] = coord.split(',').map(Number);
            const val = userBoard[r][c];
            if (val !== 0 && !isValidPlacement(r, c, val, userBoard)) {
                conflictCells.add(coord);
            } else {
                conflictCells.delete(coord);
            }
        }
    }

    function setNumber(num) {
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatus("请先点击一个格子", false);
            return;
        }
        if (fixedMask[selectedRow][selectedCol]) {
            updateStatus("题目格子不能修改", false);
            return;
        }
        if (num < 1 || num > 9) return;
        userBoard[selectedRow][selectedCol] = num;
        conflictCells.delete(`${selectedRow},${selectedCol}`);
        updateConflictsAfterChange(selectedRow, selectedCol);
        renderGrid();

        // 检查胜利并自动加分
        if (!currentGameWon && isBoardFullAndValid()) {
            checkAndAwardWin();
        } else if (!isBoardFullAndValid()) {
            if (conflictCells.size === 0)
                updateStatus("✓ 当前无冲突，继续挑战~", false);
            else
                updateStatus("⚠️ 存在冲突，可使用「检查冲突」查看", false);
        }
    }

    function clearCurrentCell() {
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatus("请先点击一个格子再清除", false);
            return;
        }
        if (fixedMask[selectedRow][selectedCol]) {
            updateStatus("题目格子不能清除", false);
            return;
        }
        if (userBoard[selectedRow][selectedCol] === 0) {
            updateStatus("当前格子已经是空的", false);
            return;
        }
        userBoard[selectedRow][selectedCol] = 0;
        conflictCells.delete(`${selectedRow},${selectedCol}`);
        updateConflictsAfterChange(selectedRow, selectedCol);
        renderGrid();
        updateStatus("🗑️ 已清空格子", false);
        // 清除后可能会使胜利状态消失，但胜利标志不用重置，因为还没胜利过
    }

    function isBoardFullAndValid() {
        for (let i = 0; i < 9; i++)
            for (let j = 0; j < 9; j++)
                if (userBoard[i][j] === 0 || !isValidPlacement(i, j, userBoard[i][j], userBoard))
                    return false;
        return true;
    }

    function checkConflicts() {
        conflictCells.clear();
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                const val = userBoard[i][j];
                if (val !== 0 && !isValidPlacement(i, j, val, userBoard)) {
                    conflictCells.add(`${i},${j}`);
                }
            }
        }
        renderGrid();
        if (conflictCells.size > 0) {
            updateStatus(`⚠️ 发现 ${conflictCells.size} 处冲突，红色格子为冲突位置`, false);
        } else {
            if (isBoardFullAndValid()) {
                if (!currentGameWon) checkAndAwardWin();
                else updateStatus("🎉 本关已胜利并获得分数！", true);
            } else {
                updateStatus("✅ 当前没有任何冲突，继续填满即可胜利", false);
            }
        }
    }

    function giveHint() {
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                if (fixedMask[i][j]) continue;
                if (userBoard[i][j] !== currentSolution[i][j]) {
                    userBoard[i][j] = currentSolution[i][j];
                    conflictCells.delete(`${i},${j}`);
                    updateConflictsAfterChange(i, j);
                    renderGrid();
                    updateStatus(`✨ 提示：在 (${i+1}, ${j+1}) 填入数字 ${currentSolution[i][j]}`, false);
                    if (!currentGameWon && isBoardFullAndValid()) {
                        checkAndAwardWin();
                    }
                    return;
                }
            }
        }
        updateStatus("🎯 所有格子已经正确！太强了！", true);
    }

    function renderGrid() {
        gridContainer.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                const val = userBoard[i][j];
                const isGiven = fixedMask[i][j];
                const isSelected = (selectedRow === i && selectedCol === j);
                const isConflict = conflictCells.has(`${i},${j}`);
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.setAttribute('data-row', i);
                cell.setAttribute('data-col', j);
                if (isGiven) cell.classList.add('given');
                else if (val !== 0) cell.classList.add('user-number');
                if (isSelected) cell.classList.add('selected');
                if (isConflict) cell.classList.add('conflict');
                if (selectedRow !== -1 && selectedCol !== -1) {
                    if (i === selectedRow || j === selectedCol || (Math.floor(i/3)===Math.floor(selectedRow/3) && Math.floor(j/3)===Math.floor(selectedCol/3))) {
                        if (!isSelected) cell.classList.add('highlight-row-col');
                    }
                }
                cell.textContent = val === 0 ? '' : val;
                cell.addEventListener('click', (function(r,c){ return function(){ selectCell(r,c); }; })(i,j));
                gridContainer.appendChild(cell);
            }
        }
    }

    function selectCell(row, col) {
        selectedRow = row;
        selectedCol = col;
        renderGrid();
    }

    function updateStatus(msg, isVictory) {
        statusDiv.innerHTML = msg;
        if (isVictory) statusDiv.classList.add('victory');
        else statusDiv.classList.remove('victory');
    }

    function initNumPad() {
        const pad = document.getElementById('num-pad');
        pad.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('div');
            btn.className = 'num-btn';
            btn.textContent = i;
            btn.addEventListener('click', (val => () => setNumber(val))(i));
            pad.appendChild(btn);
        }
        const clearBtn = document.createElement('div');
        clearBtn.className = 'num-btn clear';
        clearBtn.textContent = '🗑️ 清除';
        clearBtn.addEventListener('click', clearCurrentCell);
        pad.appendChild(clearBtn);
    }

    function initEvents() {
        document.getElementById('newGameBtn').addEventListener('click', () => {
            selectRandomPuzzle(activeDifficulty, false);
        });
        document.getElementById('nextPuzzleBtn').addEventListener('click', nextPuzzle);
        document.getElementById('checkBtn').addEventListener('click', checkConflicts);
        document.getElementById('hintBtn').addEventListener('click', giveHint);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('resetScoreBtn').addEventListener('click', resetTotalScore);
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const diff = btn.getAttribute('data-diff');
                activeDifficulty = diff;
                selectRandomPuzzle(activeDifficulty, false);
            });
        });
        window.addEventListener('keydown', (e) => {
            if (selectedRow === -1 || selectedCol === -1) return;
            const key = e.key;
            if (key >= '1' && key <= '9') {
                e.preventDefault();
                setNumber(parseInt(key, 10));
            } else if (key === 'Delete' || key === 'Backspace' || key === '0') {
                e.preventDefault();
                clearCurrentCell();
            }
        });
    }

    function init() {
        // 尝试从localStorage读取总分
        const saved = localStorage.getItem('sudoku_total_score');
        if (saved && !isNaN(parseInt(saved))) {
            totalScore = parseInt(saved);
        } else {
            totalScore = 0;
        }
        updateScoreUI();
        initNumPad();
        initEvents();
        activeDifficulty = 'medium';
        selectRandomPuzzle('medium', false);
    }
    init();
</script>
</body>
</html>
